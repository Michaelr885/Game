<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ritter auf Faerûn</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <main class="game-wrap">
    <header class="hud">
      <div class="hud-hero">
        <img src="assets/aaaaGemini_Generated_Image_6ettsz6ettsz6ett.png" alt="" class="hud-portrait" width="44" height="44" />
        <div>
          <span class="label">Abenteurer</span>
          <strong>Ritter</strong>
        </div>
      </div>
      <div class="hud-item">
        <span class="label">Sterne</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-item">
        <span class="label">Leben</span>
        <strong id="lives">❤️❤️❤️</strong>
      </div>
    </header>

    <div class="stage">
      <canvas id="game" aria-label="Karte von Faerûn"></canvas>

      <section id="screen-start" class="overlay active">
        <h1>⚔️ Ritter auf Faerûn ⚔️</h1>
        <p>Bewege deinen Ritter über die Karte und sammle die leuchtenden Sterne ein!</p>
        <p class="controls-hint">Pfeiltasten / WASD · Q und E · Klick · Mausrad zoomen</p>
        <button id="btn-start" class="btn">Abenteuer starten</button>
      </section>

      <section id="screen-over" class="overlay">
        <h1>Abenteuer beendet!</h1>
        <p>Du hast <strong id="final-score">0</strong> Sterne gesammelt.</p>
        <button id="btn-restart" class="btn">Nochmal spielen</button>
      </section>
    </div>
  </main>

  <script src="game.js?v=4"></script>
</body>
</html>
