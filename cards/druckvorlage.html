<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Faerûn – Faltkarten (HTML)</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Georgia, serif; padding: 1rem; background: #eee; color: #222; }
    .banner {
      max-width: 40rem;
      margin-bottom: 1rem;
      padding: 1rem;
      background: #fff;
      border-radius: 8px;
      border: 2px solid #c9a227;
    }
    .banner a.download {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: #b8860b;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
    }
    .grid { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }
    .fold-card { width: 63mm; height: 176mm; border: 1px dashed #999; page-break-inside: avoid; display: flex; flex-direction: column; background: #fff; }
    .card-front {
      height: 88mm; width: 100%; padding: 2mm; display: flex; flex-direction: column; align-items: center;
      border: 2px solid #333; border-radius: 3mm 3mm 0 0; position: relative; overflow: hidden; color: #fff;
    }
    .card-front img.art {
      width: 100%; height: 52mm; object-fit: cover; object-position: center;
      border-radius: 2mm; margin-bottom: 2mm;
    }
    .card-front h2 { font-size: 11pt; margin: 0; text-align: center; text-shadow: 0 1px 2px #000; }
    .card-front .effect { font-size: 7pt; text-align: center; line-height: 1.3; padding: 0 2mm; }
    .card-front .type { font-size: 6pt; text-transform: uppercase; opacity: 0.9; }
    .fold-line { border-top: 2px dashed #c00; text-align: center; font-size: 7pt; color: #c00; font-weight: bold; padding: 1mm 0; }
    .card-back {
      height: 88mm; width: 100%; padding: 4mm; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 2px solid #333; border-top: none; border-radius: 0 0 3mm 3mm; background: #fffef5;
    }
    .card-back canvas { width: 36mm !important; height: 36mm !important; }
    @media print { body { background: #fff; } .no-print { display: none; } }
  </style>
</head>
<body>
  <div class="banner no-print">
    <strong>Tipp:</strong> Am einfachsten die fertige PDF nutzen:
    <a class="download" href="Faerun-Faltkarten.pdf" download>📥 Faerun-Faltkarten.pdf</a>
    <p style="margin:0.5rem 0 0;font-size:0.9rem;">Oder unten im Browser drucken (Strg+P).</p>
  </div>
  <button class="no-print" type="button" onclick="window.print()" style="margin-bottom:1rem;padding:0.5rem 1rem;">🖨️ Drucken</button>
  <div id="cards" class="grid"></div>
  <script>
    const BASE = document.currentScript?.src
      ? new URL(".", document.currentScript.src).href
      : location.href.replace(/[^/]+$/, "");
    const dataUrl = new URL("../data/cards.json", BASE).href;
    const assetBase = new URL("../", BASE).href;

    async function buildCard(c) {
      const el = document.createElement("article");
      el.className = "fold-card";
      const imgSrc = c.image ? new URL(c.image, assetBase).href : "";
      const art = imgSrc
        ? `<img class="art" src="${imgSrc}" alt="" />`
        : `<div style="font-size:3rem">${c.emoji || "🃏"}</div>`;
      el.innerHTML = `
        <div class="card-front" style="background:linear-gradient(180deg,${c.color || "#4a5a7a"},#1a1a2a)">
          <span class="type">${c.type}</span>
          ${art}
          <h2>${c.name}</h2>
          <p class="effect">${c.text}</p>
        </div>
        <div class="fold-line">✂ HIER FALTEN</div>
        <div class="card-back">
          <span style="font-size:7pt;color:#666">RÜCKSEITE · SCAN</span>
          <canvas class="qr"></canvas>
          <span style="font-size:6pt;color:#888">${c.id}</span>
        </div>`;
      await QRCode.toCanvas(el.querySelector(".qr"), c.id, { width: 260, margin: 1 });
      return el;
    }

    fetch(dataUrl)
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(async (cards) => {
        const root = document.getElementById("cards");
        for (const c of cards) root.appendChild(await buildCard(c));
      })
      .catch((e) => {
        document.getElementById("cards").innerHTML =
          `<p>Fehler beim Laden (${e.message}). Bitte <a href="Faerun-Faltkarten.pdf">PDF herunterladen</a>.</p>`;
      });
  </script>
</body>
</html>
